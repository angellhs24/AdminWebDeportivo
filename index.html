<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sierra Juárez | Basketball Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --espn-red: #ff0000;
            --dark-blue: #040508;
            --card-gray: #1a1b1f;
            --text-white: #ffffff;
            --accent-orange: #ff8800; /* Color balón */
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-white);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR DEPORTIVO --- */
        nav {
            width: 280px;
            background: #000;
            border-right: 3px solid var(--espn-red);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ball-icon { color: var(--accent-orange); font-size: 2rem; margin-bottom: 10px; }

        .nav-link {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            transition: all 0.3s;
            border-left: 0px solid var(--espn-red);
        }

        .nav-link:hover, .nav-link.active {
            background: linear-gradient(90deg, #222, #000);
            border-left: 5px solid var(--espn-red);
            color: var(--espn-red);
        }

        /* --- ÁREA DE CONTENIDO --- */
        main { flex-grow: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top right, #1a1a1a, #040508); }

        .section { display: none; animation: fadeIn 0.4s ease-in-out; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        h1 { font-family: 'Oswald', sans-serif; font-size: 3rem; text-transform: uppercase; border-bottom: 4px solid var(--espn-red); display: inline-block; margin-bottom: 30px; }

        .espn-card {
            background: var(--card-gray);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }

        /* --- FORMULARIOS --- */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }

        input, select, textarea {
            background: #2a2b2f;
            border: 2px solid #444;
            padding: 12px;
            color: white;
            border-radius: 4px;
            font-weight: bold;
        }

        input:focus { border-color: var(--espn-red); outline: none; }

        /* --- BOTONES ANIMADOS --- */
        .btn-espn {
            background: var(--espn-red);
            color: white;
            border: none;
            padding: 15px 30px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            margin-top: 15px;
        }

        .btn-espn:hover { background: #cc0000; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,0,0,0.4); }

        /* --- ORGANIZACIÓN DE PARTIDOS (DÍAS Y CANCHAS) --- */
        .jornada-container { margin-top: 20px; }
        .dia-header { background: #333; padding: 10px 20px; margin-top: 20px; font-family: 'Oswald', sans-serif; color: var(--accent-orange); }
        .cancha-group { margin-left: 15px; border-left: 2px solid #444; padding-left: 15px; margin-bottom: 20px; }
        .cancha-title { color: #aaa; text-transform: uppercase; font-size: 0.9rem; margin: 10px 0; }

        .match-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #25262b;
            padding: 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-right: 4px solid var(--espn-red);
        }

        .btn-delete { background: none; border: 1px solid #555; color: #ff4444; padding: 5px 10px; cursor: pointer; transition: 0.3s; }
        .btn-delete:hover { background: #ff4444; color: white; border-color: #ff4444; }

    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <div class="ball-icon">🏀</div>
            SIERRA JUÁREZ<br><span style="color:var(--espn-red); font-size:0.8rem">Basketball Admin</span>
        </div>
        
        <div class="nav-link active" onclick="showSection('anuncios')">Noticias</div>
        <div class="nav-link" onclick="showSection('partidos')">Programación</div>
        <div class="nav-link" onclick="showSection('sanciones')">Disciplina</div>
        
        <div class="nav-link" onclick="cerrarSesion()" style="margin-top:auto; color:#666">Cerrar Sesión</div>
    </nav>

    <main>
        <div id="anuncios" class="section active">
            <h1>Avisos de Oficina</h1>
            <div class="espn-card">
                <input type="text" id="titulo-aviso" placeholder="ENCABEZADO DE NOTICIA" style="width:96%">
                <textarea id="contenido-aviso" placeholder="DETALLES DE LA NOTICIA..." style="width:96%; height:100px; margin-top:10px"></textarea>
                <button class="btn-espn" onclick="guardarAviso()">Publicar Noticia</button>
            </div>
            <div id="lista-anuncios"></div>
        </div>

        <div id="partidos" class="section">
            <h1>Roles de Juego</h1>
            <div class="espn-card">
                <h3>REGISTRAR ENCUENTRO</h3>
                <div class="form-grid">
                    <input type="text" id="local" placeholder="EQUIPO LOCAL">
                    <input type="text" id="visita" placeholder="EQUIPO VISITA">
                    <select id="cancha">
                        <option value="Central">Cancha Central</option>
                        <option value="1">Cancha 1</option>
                        <option value="2">Cancha 2</option>
                        <option value="3">Cancha 3</option>
                        <option value="4">Cancha 4</option>
                        <option value="5">Cancha 5</option>
                        <option value="6">Cancha 6</option>
                        <option value="7">Cancha 7</option>
                    </select>
                    <input type="time" id="hora">
                    <select id="dia">
                        <option value="Sábado">Sábado</option>
                        <option value="Domingo">Domingo</option>
                    </select>
                </div>
                <button class="btn-espn" id="btn-guardar-partido">Guardar en Calendario</button>
            </div>

            <div class="espn-card">
                <div style="display:flex; justify-content:space-between">
                    <h3>PARTIDOS PROGRAMADOS</h3>
                    <button class="btn-delete" onclick="limpiarJornada()">Limpiar Toda la Semana</button>
                </div>
                <div id="jornada-organizada">
                    </div>
            </div>
        </div>

        <div id="sanciones" class="section">
            <h1>Reporte Disciplinario</h1>
            <div class="espn-card">
                <div class="form-grid">
                    <input type="text" id="jugador-san" placeholder="NOMBRE DEL JUGADOR">
                    <input type="text" id="equipo-san" placeholder="CLUB">
                    <input type="text" id="motivo-san" placeholder="SANCIÓN (Ej: Suspensión 2 juegos)">
                </div>
                <button class="btn-espn" onclick="guardarSancion()">Aplicar Castigo</button>
            </div>
            <div id="lista-sanciones"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
