<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Liga Sierra Juárez</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; display: flex; justify-content: center; padding: 50px; }
        .card { background: #2a2a2a; padding: 30px; border-radius: 15px; border-top: 5px solid #ff4500; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #ff4500; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff4500; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #e63e00; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="card">
        <h2>NUEVO PARTIDO</h2>
        <form id="form-partido">
            <input type="text" id="local" placeholder="Equipo Local" required>
            <input type="text" id="visita" placeholder="Equipo Visitante" required>
            <input type="text" id="cancha" placeholder="Nombre de la Cancha" required>
            <input type="time" id="hora" required>
            <select id="dia">
                <option value="Sábado">Sábado</option>
                <option value="Domingo">Domingo</option>
            </select>
            <button type="submit">GUARDAR EN LA NUBE</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
