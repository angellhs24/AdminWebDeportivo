<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Principal | Liga Sierra Juárez</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4500;
            --accent: #ff8c00;
            --bg: #0f0f0f;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Fondo animado sutil */
        .background-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,69,0,0.15) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* Tarjeta de Login (Glassmorphism) */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 69, 0, 0.3);
        }

        h1 { color: white; font-weight: 600; margin-bottom: 30px; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid transparent;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            background: rgba(255,255,255,0.12);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 69, 0, 0.2);
        }

        /* Botón con animación de brillo */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
            margin-top: 10px;
        }

        button:hover {
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.4);
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: rgba(255,255,255,0.2);
            transform: rotate(45deg);
            transition: 0.5s;
            left: -150%;
        }

        button:hover::after { left: 100%; }

        .error-msg { color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="background-blob"></div>
    
    <div class="login-card">
        <h1>SISTEMA ADMIN</h1>
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="user" placeholder="Usuario" required>
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="Contraseña" required>
            </div>
            <button type="submit">ENTRAR AL SISTEMA</button>
            <div id="error" class="error-msg">Credenciales incorrectas</div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</body>
</html>
